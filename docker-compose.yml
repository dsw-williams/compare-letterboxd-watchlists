services:
  app:
    build: .
    container_name: compare-letterboxd-watchlists
    ports:
      - "3000:3000"
    volumes:
      # Unraid: change this to /mnt/user/appdata/compare-letterboxd-watchlists
      - ./data:/app/data
    environment:
      # Set these to match your Unraid user (Settings > Users, or run `id` in SSH)
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
